<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Survival OS</title>

<!-- PWA Manifest -->
<link rel="manifest" href="data:application/json,{\"name\":\"BSG Survival OS\",\"short_name\":\"BSG OS\",\"start_url\":\".\",\"display\":\"standalone\",\"background_color\":\"#0b0f14\",\"theme_color\":\"#111\",\"icons\":[]}">

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#e6edf3; }
.topbar { position:fixed; top:0; width:100%; background:#111; padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid red; z-index:1000; }
.nav-buttons button { margin:2px; padding:8px; background:#222; border:none; color:white; }
.container { margin-top:70px; padding:10px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
button.action { padding:20px; background:#1c1f26; border:1px solid #333; color:#fff; }
.panel { margin-top:20px; padding:10px; background:#111; }
.step { margin:8px 0; padding:8px; background:#1a1a1a; }
</style>
</head>
<body>

<div class="topbar">
  <div>BSG SURVIVAL OS</div>
  <div class="nav-buttons">
    <button onclick="loadQuick()">Quick</button>
    <button onclick="loadMedical()">Medical</button>
    <button onclick="loadWater()">Water</button>
  </div>
</div>

<div class="container">
  <div id="main"></div>
</div>

<script>
// SERVICE WORKER (INLINE via Blob for GitHub Pages compatibility)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'bsg-cache-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(res => res || fetch(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL);
}

function loadQuick() {
  document.getElementById('main').innerHTML = `
    <h2>QUICK ACTION</h2>
    <div class="grid">
      <button class="action" onclick="lost()">I'M LOST</button>
      <button class="action" onclick="water()">NO WATER</button>
      <button class="action" onclick="injured()">INJURED</button>
    </div>`;
}

function lost(){showSteps(["STOP","Shelter","Signal","Wait"]);} 
function water(){showSteps(["Find source","Purify","Store"]);} 
function injured(){showSteps(["Stop bleeding","Bandage","Evacuate"]);} 

function loadMedical(){showSteps(["Bleeding","Burns","Shock"]);} 
function loadWater(){showSteps(["Find","Purify","Drink"]);} 

function showSteps(steps){
 let html='<div class="panel">';
 steps.forEach((s,i)=> html+=`<div class="step">${i+1}. ${s}</div>`);
 html+='</div>';
 document.getElementById('main').innerHTML=html;
}

loadQuick();
</script>

</body>
</html>
