<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSG Survival OS</title>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#e6edf3; }
.topbar { position:fixed; top:0; width:100%; background:#111; padding:10px; display:flex; justify-content:space-between; border-bottom:2px solid red; z-index:1000; }
.nav-buttons button { margin:2px; padding:8px; background:#222; border:none; color:white; }
.container { margin-top:70px; padding:10px; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
button.action { padding:20px; background:#1c1f26; border:1px solid #333; color:#fff; cursor:pointer; }
.panel { margin-top:20px; padding:10px; background:#111; }
.step { margin:8px 0; padding:8px; background:#1a1a1a; }
.pdf-btn { margin-top:10px; padding:10px; background:#004466; color:white; border:none; cursor:pointer; width:100%; }
iframe { width:100%; height:400px; border:none; margin-top:10px; }
</style>
</head>
<body>

<div class="topbar">
  <div>BSG SURVIVAL OS</div>
  <div class="nav-buttons">
    <button onclick="loadQuick()">Quick</button>
    <button onclick="loadMedical()">Medical</button>
    <button onclick="loadWater()">Water</button>
  </div>
</div>

<div class="container">
  <div id="main"></div>
</div>

<script>

// === PDF FILE PATHS (UPLOAD THESE TO YOUR REPO) ===
const pdfs = {
  lost: "pdfs/survival-manual.pdf",
  water: "pdfs/water-purification.pdf",
  medical: "pdfs/first-aid.pdf"
};

function loadQuick() {
  document.getElementById('main').innerHTML = `
    <h2>QUICK ACTION</h2>
    <div class="grid">
      <button class="action" onclick="lost()">I'M LOST</button>
      <button class="action" onclick="water()">NO WATER</button>
      <button class="action" onclick="injured()">INJURED</button>
    </div>`;
}

function lost(){
  showSteps([
    "STOP movement",
    "Find shelter",
    "Signal for help"
  ], pdfs.lost);
}

function water(){
  showSteps([
    "Find source",
    "Purify water",
    "Store safely"
  ], pdfs.water);
}

function injured(){
  showSteps([
    "Stop bleeding",
    "Bandage",
    "Evacuate"
  ], pdfs.medical);
}

function loadMedical(){
  showSteps([
    "Bleeding control",
    "Burn treatment",
    "Shock management"
  ], pdfs.medical);
}

function loadWater(){
  showSteps([
    "Find water",
    "Purify",
    "Drink safely"
  ], pdfs.water);
}

function showSteps(steps, pdf){
  let html='<div class="panel">';

  steps.forEach((s,i)=> {
    html+=`<div class="step">${i+1}. ${s}</div>`;
  });

  html += `<button class="pdf-btn" onclick="openPDF('${pdf}')">OPEN FULL GUIDE</button>`;

  html += `<div id="pdf-viewer"></div>`;

  html+='</div>';

  document.getElementById('main').innerHTML=html;
}

function openPDF(pdf){
  document.getElementById('pdf-viewer').innerHTML = `
    <iframe src="${pdf}"></iframe>
  `;
}

// Load default
loadQuick();

</script>

</body>
</html>
